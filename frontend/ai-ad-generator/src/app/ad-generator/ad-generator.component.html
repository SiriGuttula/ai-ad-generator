<div style="width:400px;margin:40px auto">

    <h2>AI Advertisement Generator</h2>
    
    <input [(ngModel)]="productName" placeholder="Product Name" style="width:100%;margin:5px;padding:8px">
    
    <input [(ngModel)]="description" placeholder="Product Description" style="width:100%;margin:5px;padding:8px">
    
    <input [(ngModel)]="audience" placeholder="Target Audience" style="width:100%;margin:5px;padding:8px">
    
    <select [(ngModel)]="platform" style="width:100%;margin:5px;padding:8px">
    <option>Instagram</option>
    <option>Google</option>
    <option>LinkedIn</option>
    </select>
    
    <button (click)="generateAd()" style="margin-top:10px;padding:10px">
    Generate Advertisement
    </button>
    
    <div *ngIf="result" style="margin-top:20px">
    <h3>Generated Ad</h3>
    <pre>{{result}}</pre>
    </div>
    
    </div>
